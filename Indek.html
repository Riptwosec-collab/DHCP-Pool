<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHCP Automation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .terminal { font-family: ui-monospace, monospace; }
    .pool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .pool-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto space-y-6">

  <!-- Header -->
  <div class="bg-gradient-to-r from-blue-900 via-indigo-900 to-gray-900 rounded-3xl p-8 shadow-2xl">
    <div class="flex flex-wrap justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <span class="text-5xl">🌐</span>
        <div>
          <h1 class="text-4xl font-bold">DHCP Automation </h1>
          <p class="text-gray-400">Cisco DHCP Pool Generator</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="addPool()" class="bg-blue-600 hover:bg-blue-500 px-5 py-3 rounded-2xl transition flex items-center gap-2">
          <i class="fas fa-plus"></i> Add Pool
        </button>
        <button onclick="autoFillAll()" class="bg-orange-600 hover:bg-orange-500 px-5 py-3 rounded-2xl transition flex items-center gap-2">
          <i class="fas fa-magic"></i> Auto Fill
        </button>
        <button onclick="exportCfg()" class="bg-purple-600 hover:bg-purple-500 px-5 py-3 rounded-2xl transition flex items-center gap-2">
          <i class="fas fa-download"></i> Export CFG
        </button>
      </div>
    </div>
  </div>

  <!-- DNS -->
  <div class="bg-gray-900 rounded-3xl p-5 flex items-center gap-4">
    <span class="font-bold w-32 flex items-center gap-2"><i class="fas fa-server"></i> DNS Server:</span>
    <input id="dnsInput" value="10.20.100.2 10.26.100.2" onchange="updateConfig()"
           class="flex-1 p-3 bg-gray-800 border border-gray-700 rounded-2xl font-mono focus:outline-none focus:border-blue-500">
  </div>

  <!-- Search -->
  <input id="searchInput" placeholder="🔍 Search IP, MAC or Name..." onkeyup="filterPools()" 
         class="w-full p-4 rounded-2xl bg-gray-900 border border-gray-700 focus:outline-none focus:border-blue-500 text-base">

  <!-- Mass Import -->
  <div class="bg-gray-900 rounded-3xl p-6">
    <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-file-import"></i> Mass Pool Import</h2>
    <!-- Grid เดิม (เหมือนเดิม) -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div><p class="mb-2 font-bold">MAC Address</p><textarea id="bulkMac" rows="8" class="w-full p-4 rounded-2xl bg-gray-950 border border-gray-700 font-mono" placeholder="aabbccddeeff"></textarea></div>
      <div><p class="mb-2 font-bold">IP Address</p><textarea id="bulkIp" rows="8" class="w-full p-4 rounded-2xl bg-gray-950 border border-gray-700 font-mono" placeholder="10.10.10.50"></textarea></div>
      <div><p class="mb-2 font-bold">Gateway</p><textarea id="bulkGateway" rows="8" class="w-full p-4 rounded-2xl bg-gray-950 border border-gray-700 font-mono" placeholder="10.10.10.1"></textarea></div>
      <div><p class="mb-2 font-bold">VLAN</p><textarea id="bulkVlan" rows="8" class="w-full p-4 rounded-2xl bg-gray-950 border border-gray-700 font-mono" placeholder="2"></textarea></div>
    </div>
    <button onclick="bulkImport()" class="mt-4 bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
      <i class="fas fa-bolt"></i> Generate & Add Pools
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Pools -->
    <div id="poolsContainer" class="space-y-4"></div>

    <!-- Output -->
    <div class="bg-black border border-gray-800 rounded-3xl overflow-hidden">
      <div class="flex justify-between items-center p-5 border-b border-gray-700">
        <h2 class="font-bold flex items-center gap-2"><i class="fas fa-terminal"></i> Cisco Configuration Output</h2>
        <button onclick="copyAllConfig()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2.5 rounded-2xl transition font-medium">📋 Copy All</button>
      </div>
      
      <div class="p-4 border-b border-gray-700 bg-gray-950 flex items-center gap-2">
        <input type="checkbox" id="includeSourceBinding" checked onchange="updateConfig()">
        <label for="includeSourceBinding" class="text-sm cursor-pointer">รวม ip source binding</label>
      </div>

      <pre id="configOutput" class="terminal text-green-400 p-6 text-sm overflow-auto min-h-[600px] whitespace-pre-wrap bg-gray-950"></pre>
      <div id="message" class="text-center py-3 text-emerald-400 text-sm"></div>
    </div>
  </div>
</div>

<script>
let pools = [];

function init() {
  pools = [{
    id: Date.now(),
    name: "Computer",
    mac: "0100.1500.2560.aa",
    ip: "11.11.11.11",
    subnet: "255.255.255.0",
    gateway: "11.11.11.111",
    vlan: "2",
    interfaceName: "PO1"
  }];
  renderPools();
  updateConfig();
}

function formatMac(value) {
  let cleaned = value.replace(/[^a-fA-F0-9]/g, "").toLowerCase();
  if (!cleaned) return "";
  if (cleaned.length > 12) cleaned = cleaned.slice(-12);
  const fullMac = "01" + cleaned.padEnd(12, "0");
  return fullMac.match(/.{1,4}/g)?.join(".") || fullMac;
}

function cleanMac(mac) {
  return mac.replace(/[^a-fA-F0-9]/g, "").toLowerCase().replace(/^01/, "");
}

function isValidIP(ip) {
  return /^(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)){3}$/.test(ip);
}

// Validation
function getPoolStatus(pool) {
  const macClean = cleanMac(pool.mac);
  const isMacValid = macClean.length >= 12;
  const isIpValid = isValidIP(pool.ip);
  const isGwValid = isValidIP(pool.gateway);
  const isValid = isMacValid && isIpValid && isGwValid;
  return { isValid, isMacValid, isIpValid, isGwValid };
}

// Render Pools with Validation
function renderPools() {
  const container = document.getElementById('poolsContainer');
  let html = '';
  pools.forEach((pool, index) => {
    const status = getPoolStatus(pool);
    html += `
      <div class="pool-card bg-gray-900 rounded-3xl p-6 border ${status.isValid ? 'border-green-500/30' : 'border-red-500/30'}">
        <div class="flex justify-between items-start mb-4">
          <div class="flex items-center gap-3">
            <span class="text-2xl">${status.isValid ? '✅' : '⚠️'}</span>
            <div>
              <h3 class="text-xl font-bold">Pool #${index + 1}</h3>
              <span class="text-xs px-2.5 py-1 rounded-full ${status.isValid ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
                ${status.isValid ? 'Ready' : 'Incomplete'}
              </span>
            </div>
          </div>
          <div class="flex gap-3">
            <button onclick="copySingle(${pool.id})" class="text-blue-400 hover:text-blue-300"><i class="fas fa-copy"></i></button>
            <button onclick="removePool(${pool.id})" class="text-red-500 hover:text-red-600"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input value="${pool.name}" placeholder="Device Name" onchange="updateField(${pool.id}, 'name', this.value)" class="p-3 bg-gray-800 border border-gray-700 rounded-2xl">
          <input value="${pool.mac}" placeholder="MAC Address" onchange="updateField(${pool.id}, 'mac', this.value)" class="p-3 bg-gray-800 border ${status.isMacValid ? 'border-gray-700' : 'border-red-500'} rounded-2xl">
          <input value="${pool.ip}" placeholder="IP Address" onchange="updateField(${pool.id}, 'ip', this.value)" class="p-3 bg-gray-800 border ${status.isIpValid ? 'border-gray-700' : 'border-red-500'} rounded-2xl">
          <input value="${pool.gateway}" placeholder="Gateway" onchange="updateField(${pool.id}, 'gateway', this.value)" class="p-3 bg-gray-800 border ${status.isGwValid ? 'border-gray-700' : 'border-red-500'} rounded-2xl">
          <input value="${pool.subnet}" placeholder="Subnet" onchange="updateField(${pool.id}, 'subnet', this.value)" class="p-3 bg-gray-800 border border-gray-700 rounded-2xl">
          <input value="${pool.vlan}" placeholder="VLAN" onchange="updateField(${pool.id}, 'vlan', this.value)" class="p-3 bg-gray-800 border border-gray-700 rounded-2xl">
          <input value="${pool.interfaceName}" placeholder="Interface (PO1)" onchange="updateField(${pool.id}, 'interfaceName', this.value)" class="p-3 bg-gray-800 border border-gray-700 rounded-2xl md:col-span-2">
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function updateField(id, field, value) {
  pools = pools.map(p => p.id === id ? (field === 'mac' ? {...p, mac: formatMac(value)} : {...p, [field]: value}) : p);
  renderPools();
  updateConfig();
}

function addPool() { /* ... เหมือนเดิม */ 
  pools.push({ id: Date.now(), name: "Computer", mac: "", ip: "", subnet: "255.255.255.0", gateway: pools[0]?.gateway || "", vlan: pools[0]?.vlan || "2", interfaceName: pools[0]?.interfaceName || "PO1" });
  renderPools();
  updateConfig();
}

function removePool(id) {
  pools = pools.filter(p => p.id !== id);
  renderPools();
  updateConfig();
}

// Auto Fill, Bulk Import, Generate Config, Copy Functions (เหมือนเวอร์ชันก่อนหน้า)
function autoFillAll() { /* คงเดิม */ 
  if (!pools.length) return;
  const first = pools[0];
  let prefix = "", start = 0;
  if (first.ip) {
    const s = first.ip.split(".");
    if (s.length === 4) { prefix = `${s[0]}.${s[1]}.${s[2]}`; start = Number(s[3]); }
  }
  pools = pools.map((p, i) => ({...p, gateway: first.gateway || p.gateway, vlan: first.vlan || p.vlan, subnet: first.subnet || p.subnet, interfaceName: first.interfaceName || p.interfaceName, ip: prefix ? `${prefix}.${start + i}` : p.ip }));
  renderPools();
  updateConfig();
  showMessage("Auto Fill สำเร็จ ✅");
}

function bulkImport() { /* คงเดิม */ 
  // (ย่อ) ใช้ logic เดิม
  const macLines = document.getElementById('bulkMac').value.trim().split("\n").map(l=>l.trim()).filter(Boolean);
  const ipLines = document.getElementById('bulkIp').value.trim().split("\n").map(l=>l.trim()).filter(Boolean);
  const gatewayLines = document.getElementById('bulkGateway').value.trim().split("\n").map(l=>l.trim()).filter(Boolean);
  const vlanLines = document.getElementById('bulkVlan').value.trim().split("\n").map(l=>l.trim()).filter(Boolean);

  if (macLines.length === 0 || ipLines.length === 0) return showMessage("กรุณากรอก MAC และ IP");
  if (macLines.length !== ipLines.length) return showMessage("จำนวน MAC และ IP ไม่ตรงกัน");

  const defaultGateway = gatewayLines[0] || (pools[0]?.gateway || "10.10.10.1");
  const newPools = macLines.map((mac,i) => ({
    id: Date.now()+i, name:"Computer", mac:formatMac(mac), ip:ipLines[i]||"", subnet:"255.255.255.0",
    gateway: gatewayLines[i]||defaultGateway, vlan:vlanLines[i]||(pools[0]?.vlan||"2"), interfaceName: pools[0]?.interfaceName||"PO1"
  }));

  pools = [...pools, ...newPools];
  renderPools();
  updateConfig();
  showMessage(`เพิ่ม ${newPools.length} Pools สำเร็จ ✅`);
  document.getElementById('bulkMac').value = document.getElementById('bulkIp').value = document.getElementById('bulkGateway').value = document.getElementById('bulkVlan').value = '';
}

// Generate Config + Copy (เหมือนเวอร์ชันก่อนหน้า)
function generateConfig() { /* ... คงเดิม */ 
  // (ใช้โค้ด generateConfig จากเวอร์ชันก่อนหน้า)
  if (pools.length === 0) return "ยังไม่มี Pool";
  const validPools = pools.filter(p => {
    const macClean = cleanMac(p.mac);
    return macClean.length >= 12 && p.ip && isValidIP(p.ip) && p.gateway && isValidIP(p.gateway);
  });
  if (validPools.length === 0) return "กรุณากรอกข้อมูลให้ครบ (MAC, IP, Gateway)";

  const dns = document.getElementById('dnsInput').value.trim() || "10.20.100.2 10.26.100.2";
  const includeBinding = document.getElementById('includeSourceBinding').checked;

  return validPools.map(p => {
    const macClean = cleanMac(p.mac).slice(0, 12).padEnd(12, "0");
    const dotMac = `01${macClean}`.match(/.{1,4}/g)?.join(".") || "";
    let config = [`ip dhcp pool ${p.ip}_${p.name}`, ` host ${p.ip} ${p.subnet}`, ` client-identifier ${dotMac}`, ` default-router ${p.gateway}`, ` dns-server ${dns}`, ``, ` update arp`];
    if (includeBinding) config.push(``, ` ip source binding ${dotMac} vlan ${p.vlan} ${p.ip} interface ${p.interfaceName}`);
    return config.join("\n");
  }).join("\n\n!\n\n");
}

function updateConfig() {
  document.getElementById('configOutput').textContent = generateConfig();
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return true;
  }
}

async function copyAllConfig() {
  const config = generateConfig();
  if (config.includes("กรุณากรอก")) return showMessage("ยังไม่มี Config ที่สมบูรณ์");
  const success = await copyToClipboard(config);
  showMessage(success ? "✅ Copy All สำเร็จ" : "❌ Copy ไม่สำเร็จ");
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  setTimeout(() => msg.textContent = '', 2500);
}

window.onload = init;
</script>
</body>
</html>
